services:
  devcontainer:
    build:
      cache_from:
        - ghcr.io/decentm/project-maps-devcontainer:latest
      context: ..
      dockerfile: .devcontainer/Dockerfile
    ports:
      - 9000:9000
    networks:
      - grpc
    volumes:
      - ..:/workspace
      - ${HOME}/.ssh:/home/user/.ssh:ro
      - ${HOME}/.gitconfig:/home/user/.gitconfig:ro
      - ${HOME}/.npmrc:/home/user/.npmrc:ro
      - ${HOME}/.gnupg:/home/user/.gnupg
      - ${HOME}/.bashrc:/home/user/.bashrc_user:ro
    command: sleep infinity
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 7g

  envoy:
    image: envoyproxy/envoy:v1.33-latest
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks:
      - grpc
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 128m

  nominatim:
    build:
      context: ../packages/nominatim
      dockerfile: Dockerfile
    networks:
      - grpc
    environment:
      PBF_URL: https://download.geofabrik.de/europe/estonia-latest.osm.pbf
    volumes:
      - nominatim_data:/var/lib/postgresql
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g

volumes:
  nominatim_data:

networks:
  grpc:
    driver: bridge
